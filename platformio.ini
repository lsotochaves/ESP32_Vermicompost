[env:esp32dev]
platform  = espressif32
board     = esp32dev          ; ESP32-D0WD-V3, dual core
framework = arduino
monitor_speed = 115200

build_flags =
    -DVERMI_RTC_BUFFER_CAPACITY=256   ; readings buffered across sleep cycles
    -I include

; Add libraries as you wire real sensors / transport:
lib_deps =
    paulstoffregen/OneWire
    milesburton/DallasTemperature
    https://github.com/DFRobot/DFRobot_OxygenSensor.git
    ; knolleary/PubSubClient
